<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>呼吸流量臨床監測系統</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: 'Noto Sans TC', Arial, sans-serif; background: #f4f7f5; margin: 0; color: #333; }
    .container { max-width: 850px; margin: 30px auto; background: #fff; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 32px; }
    .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eef2ee; padding-bottom: 12px; margin-bottom: 20px; }
    
    .patient-card { background: #f0f7f4; padding: 20px; border-radius: 12px; border: 1px solid #cce0cc; margin-bottom: 20px; }
    .patient-card h3 { margin: 0 0 14px 0; color: #1abc68; font-size: 16px; border-left: 4px solid #1abc68; padding-left: 8px; }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
    .form-group { display: flex; flex-direction: column; }
    .form-group label { font-size: 13px; font-weight: bold; margin-bottom: 4px; color: #4a5568; }
    .form-group input, .form-group select { padding: 10px; border: 1px solid #cce0cc; border-radius: 6px; font-size: 14px; }
    .form-group input:focus, .form-group select:focus { border-color: #1abc68; outline: none; }
    
    .control-panel { background: #f8f9fa; border: 1px solid #e2e8f0; padding: 16px; border-radius: 12px; margin-bottom: 20px; display: flex; gap: 16px; flex-wrap: wrap; }
    .panel-group { flex: 1; min-width: 200px; }
    .panel-group label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: #4a5568; }
    .toggle-btn { background: #edf2f7; color: #4a5568; border: 1px solid #cbd5e0; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; transition: all 0.2s; margin-right: 8px; }
    .toggle-btn.active { background: #1abc68; color: #fff; border-color: #1abc68; }
    .toggle-btn.active.mode-exhale { background: #3182ce; border-color: #3182ce; }
    
    .chart-container { position:relative; aspect-ratio:2/1; width:100%; max-width:650px; margin:20px auto; }
    
    .alert-banner { display: none; background: #fff5f5; border: 1px solid #fed7d7; color: #c53030; padding: 12px; border-radius: 8px; margin: 12px 0; font-weight: bold; font-size: 16px; text-align: center; animation: blink 1s infinite alternate; }
    @keyframes blink { 0% { box-shadow: 0 0 4px #feb2b2; } 100% { box-shadow: 0 0 12px #f56565; background: #fff; } }
    
    .status-banner { background: #ebf8ff; border: 1px solid #bee3f8; color: #2b6cb0; padding: 12px; border-radius: 8px; margin: 12px 0; font-weight: bold; }
    .lights { display: flex; gap: 16px; margin: 16px 0; }
    .light { width: 32px; height: 32px; border-radius: 50%; background: #ccc; border: 2px solid #bbb; }
    .light.red { background: #ff4b33; box-shadow: 0 0 8px #ff4b33; }
    .light.green { background: #00ffe8; box-shadow: 0 0 8px #00ffe8; }
    .light.grey { background: #ccc; }

    .image-row { display: flex; justify-content: center; align-items: flex-end; gap: 18px; margin: 16px 0; flex-wrap: wrap; }
    .imgbox { display: flex; flex-direction: column; align-items: center; }
    .imgbox img { height: 200px; width: auto; object-fit: contain; background: #f7faf7; border-radius: 10px; box-shadow: 0 1px 4px #e0e0e0; max-width: 280px; display: block; }
    .imgbox .caption { font-size: 14px; color: #666; margin-top: 6px; text-align: center; font-weight: bold; }

    #lungsBox { display: none; width: 267px; height: 234px; margin: 24px auto; position: relative; perspective: 1000px; }
    #lungsImg { 
      width: 100%; height: 100%; display: block; 
      transition: transform 0.1s linear, filter 0.1s linear; 
      transform-origin: center center;
      filter: url(#lungDistortion); 
    }
    #lungsPercent { position: absolute; left:0; right:0; top:45%; text-align:center; color:#2d3748; font-weight:bold; font-size:24px; z-index:3; text-shadow:0 0 8px #fff; }
    
    .flow-display { display: flex; justify-content: space-around; background: #f8f9fa; border-radius: 8px; padding: 16px; text-align: center; margin: 15px 0; border: 1px solid #eee; }
    .flow-val-box { font-size: 16px; font-weight: bold; }
    .flow-val-box span { font-size: 32px; color: #1abc68; }

    .save-btn { background: #1abc68; color: #fff; border: none; border-radius: 6px; padding: 14px 32px; font-size: 16px; cursor: pointer; width: 100%; margin-top: 16px; font-weight: bold; }
    .save-btn:disabled { background: #ccc; cursor: not-allowed; }
    .login-btn, .myfiles-btn { background: #4e7fff; color: #fff; border: none; border-radius: 6px; padding: 8px 18px; font-size: 14px; cursor: pointer; }
    .hidden { display: none; }
    .error-text { color: #ff4b33; font-size: 12px; display: none; margin-top: 2px; }
  </style>
</head>
<body>

  <svg width="0" height="0" style="position: absolute;">
    <defs>
      <filter id="lungDistortion">
        <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" result="noise" />
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G" id="feDisplacement" />
      </filter>
    </defs>
  </svg>

  <div class="container">
    <div class="header">
      <h2>呼吸流量臨床監測系統</h2>
      <div class="greeting hidden" id="greeting"></div>
    </div>

    <div class="patient-card">
      <h3>第一步：請輸入病患基本生理資訊 (系統將自動推算專屬正常區間)</h3>
      <div class="form-grid">
        <div class="form-group">
          <label>病歷號碼</label>
          <input id="patientId" placeholder="e.g. P1001" />
        </div>
        <div class="form-group">
          <label>身分證字號</label>
          <input id="patientName" placeholder="e.g. A123456789" maxlength="10" />
          <div id="idError" class="error-text">身分證格式錯誤</div>
        </div>
        <div class="form-group">
          <label>生理性別</label>
          <select id="patientGender">
            <option value="">選擇性別</option>
            <option value="male">男 (Male)</option>
            <option value="female">女 (Female)</option>
          </select>
        </div>
        <div class="form-group">
          <label>年齡 (歲)</label>
          <input id="patientAge" type="number" placeholder="e.g. 45" min="1" max="120" />
        </div>
        <div class="form-group">
          <label>身高 (公分)</label>
          <input id="patientHeight" type="number" placeholder="e.g. 170" min="50" max="250" />
        </div>
      </div>
    </div>

    <div class="control-panel">
      <div class="panel-group">
        <label>量測模式設定</label>
        <button class="toggle-btn active" id="btnModeSingle">單次吸/呼測試</button>
        <button class="toggle-btn" id="btnModeContinuous">連續呼吸週期測試</button>
      </div>
      <div class="panel-group">
        <label>當前硬體流向解析機制</label>
        <button class="toggle-btn active" id="directionIn">吸氣模式 (正值)</button>
        <button class="toggle-btn" id="directionOut">吐氣模式 (負值/反轉)</button>
      </div>
    </div>

    <div class="row" style="margin-bottom: 12px;">
      <button class="login-btn" id="loginBtn">登入帳號</button>
      <button class="myfiles-btn hidden" id="myfilesBtn">用藥紀錄歷史</button>
      <button class="toggle-btn" id="connectBtn" disabled style="background: #e67e22; color:#fff;">連接量測裝置</button>
    </div>

    <div id="alertBanner" class="alert-banner"></div>
    <div id="statusBanner" class="status-banner">請完整填寫上方生理資訊（病歷號、身分證、性別、年齡、身高）以計算醫學預測常模。</div>

    <div class="lights" id="lights">
      <div class="light grey" id="light1"></div>
      <div class="light grey" id="light2"></div>
      <div class="light grey" id="light3"></div>
    </div>

    <div class="image-row" id="stepImages"></div>
    <div id="instruction" style="font-size: 16px; margin: 10px 0; color: #e67e22; font-weight: bold;"></div>

    <div class="chart-container" id="chartBox">
      <canvas id="flowChart"></canvas>
    </div>

    <div id="lungsBox">
      <img src="img/lungs.png" id="lungsImg" alt="肺部圖像">
      <div id="lungsPercent">0%</div>
    </div>

    <div class="flow-display">
      <div class="flow-val-box">
        當前即時數值<br><span id="flowValue">0.00</span> L/min
      </div>
      <div class="flow-val-box" style="border-left: 1px solid #ddd; padding-left: 20px;">
        臨床狀態解析<br><span id="clinicalStatus" style="font-size:18px; color:#4a5568; font-weight:bold;">等待初始化</span>
      </div>
    </div>

    <button class="save-btn" id="saveBtn" disabled>儲存本次量測資料</button>
  </div>

<script>
const { createClient } = window.supabase;
const SUPABASE_URL = 'https://supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxZHRsa3h2eXJycG5ia3lpaWdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDgyNTAwMTksImV4cCI6MjA2MzgyNjAxOX0.6ufrl0cNDT1LZqge0yTEGzzJ4IlYYubtKis2_ewkERw';
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// 醫療引導文字與指示燈矩陣
const instructions = [
  "請先取下吸入器蓋子，然後放置吸入器。若燈未亮，請向左（順時針）旋轉，左側第一顆指示燈應亮綠色。",
  "請確定吸入器蓋子已取下，然後向右（逆時針）旋轉以釋放劑量，第二顆燈應亮綠色。",
  "現在可以吸入藥劑：請將吸嘴含入口中，用力深吸，移開吸入器並屏住呼吸約10秒。",
  "吸入器使用完成，裝置將於10秒後關閉。"
];
const stepImagesData = [
  [{ src: "img/lidOff_correct.png", alt: "取下蓋子", caption: "取下吸入器蓋子" }, { src: "img/clockwise.png", alt: "順時針", caption: "插入裝置底座順時針旋轉" }],
  [{ src: "img/lidOff_highRes.png", alt: "取下蓋子", caption: "取下吸入器蓋子" }, { src: "img/counterclockwise.png", alt: "逆時針", caption: "逆時針旋轉" }],
  [{ src: "img/breatheOutandIn.png", alt: "吐氣吸氣", caption: "吐氣3秒後深吸3秒" }],
  []
];
const lightModes = [
  ['grey', 'grey', 'grey'],
  ['green', 'red', 'red'],
  ['green', 'green', 'red'],
  ['green', 'green', 'green']
];

// 動態臨床常模邊界值
let TARGET_IN_MIN = 60;
let TARGET_IN_MAX = 90;
let DANGER_LIMIT_IN = 130;
let TARGET_OUT_MIN = -450;
let TARGET_OUT_MAX = -300;
let DANGER_LIMIT_OUT = -650;
let testMode = 'single';
let flowDirection = 'inhale';
let serialPort, reader;
let startTime = null;
let flowData = [];
let lastValue = 0;
let audioCtx = null;
let currentStep = 0;

const inputs = ['patientId', 'patientName', 'patientGender', 'patientAge', 'patientHeight'].map(id => document.getElementById(id));
const idError = document.getElementById('idError');
const connectBtn = document.getElementById('connectBtn');
const saveBtn = document.getElementById('saveBtn');
const alertBanner = document.getElementById('alertBanner');
const statusBanner = document.getElementById('statusBanner');
const idRegex = /^[A-Z]\d{8}$/;

// 醫學常模推算
function calculateMedicalPredicted() {
  const pId = document.getElementById('patientId').value.trim();
  const pName = document.getElementById('patientName').value.trim();
  const gender = document.getElementById('patientGender').value;
  const age = parseFloat(document.getElementById('patientAge').value);
  const height = parseFloat(document.getElementById('patientHeight').value);
  const isIdValid = idRegex.test(pName);
  
  idError.style.display = (pName.length > 0 && !isIdValid) ? 'block' : 'none';
  
  if (pId && isIdValid && gender && !isNaN(age) && !isNaN(height)) {
    let predictedPEF_Lmin = 0;
    if (gender === 'male') {
      const pefLperSec = (1.05 * (height / 100)) - (0.046 * age) + 1.25;
      predictedPEF_Lmin = pefLperSec * 60;
    } else {
      const pefLperSec = (0.78 * (height / 100)) - (0.03 * age) + 1.95;
      predictedPEF_Lmin = pefLperSec * 60;
    }
    TARGET_OUT_MIN = -Math.round(predictedPEF_Lmin);
    TARGET_OUT_MAX = -Math.round(predictedPEF_Lmin * 0.75);
    DANGER_LIMIT_OUT = -Math.round(predictedPEF_Lmin * 1.3);
    if (age > 65 || height < 150) {
      TARGET_IN_MIN = 45;
    } else {
      TARGET_IN_MIN = 60;
    }
    TARGET_IN_MAX = 95;
    DANGER_LIMIT_IN = 135;
    connectBtn.disabled = false;
    statusBanner.style.color = '#1abc68';
    statusBanner.innerHTML = `🟢 <b>常模推算成功！</b><br>此病患預估尖峰流速標準值為: <b>${Math.round(predictedPEF_Lmin)} L/min</b>。<br>已同步校正安全圖表臨界點。請點擊「連接量測裝置」。`;
    document.getElementById('clinicalStatus').textContent = "系統已就緒";
    updateChartAxes();
  } else {
    connectBtn.disabled = true;
    statusBanner.style.color = '#2b6cb0';
    statusBanner.textContent = "請完整填寫上方生理資訊（病歷號、身分證、性別、年齡、身高）以計算醫學預測常模。";
  }
}

inputs.forEach(el => el.addEventListener('input', calculateMedicalPredicted));
document.getElementById('patientGender').addEventListener('change', calculateMedicalPredicted);

// 步驟控制狀態機 (setStep)
function setStep(step) {
  currentStep = step;
  // 1. 驅動指示燈
  const lights = lightModes[step];
  for (let i = 0; i < 3; i++) {
    document.getElementById('light' + (i + 1)).className = 'light ' + lights[i];
  }
  // 2. 更新引導文字
  document.getElementById('instruction').innerHTML = instructions[step];
  // 3. 動態渲染對應圖片
  const imageRow = document.getElementById('stepImages');
  imageRow.innerHTML = '';
  stepImagesData[step].forEach(img => {
    const box = document.createElement('div');
    box.className = 'imgbox';
    box.innerHTML = `<img src="${img.src}" alt="${img.alt}"><div class="caption">${img.caption}</div>`;
    imageRow.appendChild(box);
  });
  // 4. 控制肺部動畫顯示時機
  const lungsBox = document.getElementById('lungsBox');
  if (step === 2 || step === 3) {
    lungsBox.style.display = 'block';
  } else {
    lungsBox.style.display = 'none';
  }
}

// 模式與流向按鈕切換
document.getElementById('btnModeSingle').addEventListener('click', () => {
  testMode = 'single';
  document.getElementById('btnModeSingle').classList.add('active');
  document.getElementById('btnModeContinuous').classList.remove('active');
  updateChartAxes();
});
document.getElementById('btnModeContinuous').addEventListener('click', () => {
  testMode = 'continuous';
  document.getElementById('btnModeContinuous').classList.add('active');
  document.getElementById('btnModeSingle').classList.remove('active');
  updateChartAxes();
});
document.getElementById('directionIn').addEventListener('click', () => {
  flowDirection = 'inhale';
  document.getElementById('directionIn').classList.add('active');
  document.getElementById('directionOut').classList.remove('active');
  updateChartAxes();
});
document.getElementById('directionOut').addEventListener('click', () => {
  flowDirection = 'exhale';
  document.getElementById('directionOut').classList.add('active');
  document.getElementById('directionIn').classList.remove('active');
  updateChartAxes();
});

// 初始化 Chart.js
const ctx = document.getElementById('flowChart').getContext('2d');
let flowChart = new Chart(ctx, {
  type: 'line',
  data: { labels: [], datasets: [{ label: '呼吸流速波形 (L/min)', data: [], borderColor: '#1abc68', fill: false, tension: 0.2, pointRadius: 0 }] },
  options: {
    responsive: true,
    maintainAspectRatio: true,
    animation: false,
    scales: {
      x: { title: { display: true, text: '時間 (秒)' } },
      y: { min: -150, max: 150 }
    }
  }
});

function updateChartAxes() {
  const maxInAxis = Math.round(DANGER_LIMIT_IN * 1.2);
  const minOutAxis = Math.round(DANGER_LIMIT_OUT * 1.2);
  if (testMode === 'continuous') {
    flowChart.options.scales.y.min = minOutAxis;
    flowChart.options.scales.y.max = maxInAxis;
  } else {
    flowChart.options.scales.y.min = flowDirection === 'inhale' ? 0 : minOutAxis;
    flowChart.options.scales.y.max = flowDirection === 'inhale' ? maxInAxis : 0;
  }
  flowChart.update();
}

// 肺部組織膨脹動畫
function updateLungAnatomyAnimation(rawValue) {
  const img = document.getElementById('lungsImg');
  const feDisp = document.getElementById('feDisplacement');
  const percentText = document.getElementById('lungsPercent');
  const delta = Math.abs(rawValue - lastValue);
  lastValue = rawValue;
  if (rawValue >= 0) {
    const intensity = Math.min(rawValue / DANGER_LIMIT_IN, 1);
    const scale = 1 + (intensity * 0.28);
    const distortionScale = Math.min(delta * 2, 45);
    img.style.transform = `scale(${scale})`;
    feDisp.setAttribute('scale', distortionScale);
    img.style.filter = `url(#lungDistortion) drop-shadow(0 0 ${intensity * 15}px rgba(26,188,104,0.8)) hue-rotate(${intensity * 30}deg)`;
    percentText.textContent = `吸氣 ${Math.round(intensity * 100)}%`;
    percentText.style.color = '#1abc68';
  } else {
    const intensity = Math.min(Math.abs(rawValue) / Math.abs(DANGER_LIMIT_OUT), 1);
    const scale = 1 - (intensity * 0.18);
    const distortionScale = Math.min(delta * 1.5, 35);
    img.style.transform = `scale(${scale})`;
    feDisp.setAttribute('scale', distortionScale);
    img.style.filter = `url(#lungDistortion) drop-shadow(0 0 ${intensity * 15}px rgba(49,130,206,0.8)) hue-rotate(140deg)`;
    percentText.textContent = `呼氣 ${Math.round(intensity * 100)}%`;
    percentText.style.color = '#3182ce';
  }
}

// 音效警報
function playMedicalAlert(type) {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  if (type === 'danger') {
    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(880, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
    osc.start(); osc.stop(audioCtx.currentTime + 0.15);
  } else if (type === 'deviation') {
    osc.type = 'sine'; osc.frequency.setValueAtTime(440, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
  }
}

// 區間安全演算
function evaluateClinicalRange(val) {
  const alertEl = document.getElementById('alertBanner');
  const clinicalEl = document.getElementById('clinicalStatus');
  if (val > 2.0) {
    if (val >= DANGER_LIMIT_IN) {
      alertEl.style.display = 'block';
      alertEl.textContent = `🚨 危險！吸氣流速過高: ${val.toFixed(1)} L/min (已高於安全極限 ${DANGER_LIMIT_IN}，有肺泡受損風險)`;
      clinicalEl.textContent = "危險超強吸氣";
      playMedicalAlert('danger');
    } else if (val > TARGET_IN_MAX) {
      alertEl.style.display = 'block';
      alertEl.textContent = `⚠️ 提示：吸氣強度超出設定區間 (+${(val - TARGET_IN_MAX).toFixed(1)} L/min)`;
      clinicalEl.textContent = "吸氣過強";
      playMedicalAlert('deviation');
    } else if (val < TARGET_IN_MIN) {
      alertEl.style.display = 'block';
      alertEl.textContent = `⚠️ 提示：吸氣強度不足 (距有效常模下限還差 ${(TARGET_IN_MIN - val).toFixed(1)} L/min)`;
      clinicalEl.textContent = "吸氣不足";
    } else {
      alertEl.style.display = 'none';
      clinicalEl.textContent = "🟢 正常有效吸氣";
    }
  } else if (val < -2.0) {
    if (val <= DANGER_LIMIT_OUT) {
      alertEl.style.display = 'block';
      alertEl.textContent = `🚨 危險！強力呼氣過度: ${val.toFixed(1)} L/min (已衝破安全極限 ${DANGER_LIMIT_OUT})`;
      clinicalEl.textContent = "危險超強呼氣";
      playMedicalAlert('danger');
    } else if (val < TARGET_OUT_MIN) {
      alertEl.style.display = 'block';
      alertEl.textContent = `⚠️ 提示：呼氣衝力超出常模範圍 (${(val - TARGET_OUT_MIN).toFixed(1)} L/min)`;
      clinicalEl.textContent = "呼氣過強";
      playMedicalAlert('deviation');
    } else if (val > TARGET_OUT_MAX) {
      alertEl.style.display = 'block';
      alertEl.textContent = `⚠️ 提示：呼氣力道未達標 (距病患理想尖峰流速還差 ${Math.abs(val - TARGET_OUT_MIN).toFixed(1)} L/min)`;
      clinicalEl.textContent = "呼氣力道不足";
    } else {
      alertEl.style.display = 'none';
      clinicalEl.textContent = "🔵 理想尖峰呼氣";
    }
  } else {
    alertEl.style.display = 'none';
    clinicalEl.textContent = "平穩靜止";
  }
}

// Web Serial 連接
connectBtn.addEventListener('click', async () => {
  try {
    statusBanner.textContent = '進行序列埠連線中...';
    serialPort = await navigator.serial.requestPort();
    await serialPort.open({ baudRate: 115200 });
    statusBanner.style.color = '#2b6cb0';
    statusBanner.textContent = '🟢 串列埠連線完成。已啟動設備對接。';
    connectBtn.classList.add('hidden');
    setStep(0); // 初始化啟動步驟 0
    readSerialStream();
  } catch (err) {
    statusBanner.textContent = '❌ 連線失敗：' + err.message;
  }
});

if ('serial' in navigator) {
  navigator.serial.addEventListener('disconnect', () => {
    alert('⚠️ 偵測到裝置已中斷連線！請重新檢查 USB 線路。');
    statusBanner.textContent = '❌ 裝置已斷線';
    connectBtn.classList.remove('hidden');
    saveBtn.disabled = true;
    for (let i = 1; i <= 3; i++) { 
      document.getElementById('light' + i).className = 'light grey'; 
    }
  });
}

async function readSerialStream() {
  const textDecoder = new TextDecoderStream();
  serialPort.readable.pipeTo(textDecoder.writable);
  reader = textDecoder.readable.getReader();
  let buffer = '';
  try {
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      if (value) {
        buffer += value;
        let lines = buffer.split('\n');
        buffer = lines.pop();
        for (let line of lines) { parseHardwareData(line.trim()); }
      }
    }
  } catch (err) { console.error(err); }
}

// 處理硬體數據
function parseHardwareData(line) {
  if (!line) return;
  let rawValue = parseFloat(line);
  if (isNaN(rawValue)) return;
  
  if (flowDirection === 'exhale' && rawValue > 0) {
    rawValue = rawValue * -1;
  }
  
  document.getElementById('flowValue').textContent = rawValue.toFixed(2);
  if (startTime === null) startTime = Date.now();
  const elapsed = ((Date.now() - startTime) / 1000);
  
  flowChart.data.labels.push(elapsed.toFixed(1));
  flowChart.data.datasets[0].data.push(rawValue);
  
  if(flowChart.data.labels.length > 60) {
    flowChart.data.labels.shift();
    flowChart.data.datasets[0].data.shift();
  }
  flowChart.update();
  updateLungAnatomyAnimation(rawValue);
  evaluateClinicalRange(rawValue);
  
  flowData.push({ time: elapsed.toFixed(1), value: rawValue });
  saveBtn.disabled = false;
}

// 儲存至 Supabase 雲端
saveBtn.addEventListener('click', async () => {
  try {
    saveBtn.disabled = true;
    saveBtn.textContent = '上傳雲端電子病歷...';
    const { data: { user } } = await supabaseClient.auth.getUser();
    const { error } = await supabaseClient
      .from('breathing_logs')
      .insert([{
        patient_id: document.getElementById('patientId').value.trim(),
        patient_name: document.getElementById('patientName').value.trim(),
        gender: document.getElementById('patientGender').value,
        age: parseInt(document.getElementById('patientAge').value),
        height: parseInt(document.getElementById('patientHeight').value),
        mode_type: testMode,
        flow_records: flowData,
        user_id: user ? user.id : null,
        created_at: new Date().toISOString()
      }]);
    if (error) throw error;
    alert('✅ 資料與臨床常模數據已成功同步至 Supabase 資料庫！');
    location.reload();
  } catch (err) {
    alert('儲存失敗：' + err.message);
    saveBtn.disabled = false;
  }
});
</script>
